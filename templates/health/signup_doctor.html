{% extends 'base.html' %}
{% load static %}

{% block title %}Doctor Signup - HealthBridge{% endblock %}

{% block content %}
<div class="signup-form-container">
    <div class="signup-card">
        <div class="form-header">
            <a href="{% url 'health:signup' %}" class="back-btn">← Back</a>
            <div>
                <h2>Doctor Registration</h2>
                <p>Create your professional account</p>
            </div>
        </div>

        <form method="POST" class="signup-form">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">First Name <span class="required">*</span></label>
                    <input type="text" id="first_name" name="first_name" autocomplete="given-name" required placeholder="Enter your first name">
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name <span class="required">*</span></label>
                    <input type="text" id="last_name" name="last_name" autocomplete="family-name" required placeholder="Enter your last name">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" autocomplete="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input type="text" id="phone" name="phone" required placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="specialization">Specialization <span class="required">*</span></label>
                <input type="text" id="specialization" name="specialization" required placeholder="e.g., Cardiology, Pediatrics, General Medicine">
            </div>

            <div class="form-group">
                <label for="license_number">Medical License Number <span class="required">*</span></label>
                <input type="text" id="license_number" name="license_number" required placeholder="Enter your medical license number">
            </div>

            <div class="form-group">
                <label for="clinic_name">Clinic/Hospital Name <span class="required">*</span></label>
                <input type="text" id="clinic_name" name="clinic_name" required placeholder="Enter your clinic or hospital name">
            </div>

            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <input type="number" id="experience" name="experience" placeholder="Enter years of experience">
            </div>

            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Create a strong password (min 6 characters)">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms & Conditions and Privacy Policy</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Doctor Account</button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="{% url 'health:signin' %}">Sign In Here</a></p>
        </div>
    </div>
</div>

{% block extra_css %}
<style>
.signup-form-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 600px;
    padding: 2rem 0;
}

.signup-card {
    background: white;
    padding: 2.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 500px;
}

.form-header {
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
}

.back-btn {
    color: var(--secondary-color);
    text-decoration: none;
    font-weight: 600;
    padding: 0.5rem 0;
    white-space: nowrap;
    align-self: center;
}

.back-btn:hover {
    text-decoration: underline;
}

.form-header h2 {
    color: var(--primary-color);
    margin-bottom: 0.5rem;
}

.form-header p {
    color: #666;
    font-size: 0.9rem;
}

.signup-form {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 0.5rem;
    color: var(--primary-color);
    font-weight: 600;
    font-size: 0.95rem;
}

.required {
    color: #e74c3c;
}

.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"],
.form-group input[type="number"],
.form-group select {
    padding: 0.8rem;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1rem;
    transition: border-color 0.3s ease;
    font-family: inherit;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--secondary-color);
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
}

.form-group.checkbox {
    flex-direction: row;
    align-items: center;
    gap: 0.5rem;
}

.form-group.checkbox input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

.form-group.checkbox label {
    margin-bottom: 0;
    font-weight: normal;
    font-size: 0.9rem;
}

.btn-block {
    width: 100%;
    padding: 0.9rem;
    margin-top: 0.5rem;
}

.form-footer {
    text-align: center;
    margin-top: 1.5rem;
    border-top: 1px solid #eee;
    padding-top: 1.5rem;
    font-size: 0.9rem;
}

.form-footer a {
    color: var(--secondary-color);
    text-decoration: none;
}

.form-footer a:hover {
    text-decoration: underline;
}

@media (max-width: 768px) {
    .signup-card {
        padding: 1.5rem;
    }
    
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .form-header {
        flex-direction: column;
    }
}
</style>
{% endblock %}
{% endblock %}
