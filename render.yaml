services:
  - type: web
    name: healthbridge
    runtime: python3
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    # Use the Django project package name `healthcare` for gunicorn
    startCommand: gunicorn healthcare.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: healthcare.settings
      - key: SECRET_KEY
        value: your-secret-key-here  # Replace with actual secret key
      - key: DEBUG
        value: False